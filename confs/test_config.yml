classifier_scale: 4.0
lr_kernel_n_std: 2
num_samples: 100
show_progress: true
timestep_respacing: '250'

classifier_use_fp16: false
classifier_width: 128
classifier_depth: 2
classifier_attention_resolutions: 32,16,8
classifier_use_scale_shift_norm: true
classifier_resblock_updown: true
classifier_pool: attention

clip_denoised: true
use_ddim: false
latex_name: RePaint
method_name: Repaint
image_size: 256
model_path: ./weights/model_ckpt.pt

name: test_example
inpa_inj_sched_prev: true
n_jobs: 1
print_estimated_vars: true
inpa_inj_sched_prev_cumnoise: false
condition:
  small_size: 85
  large_size: 256
  condition_flag: "sr"

model:
    image_size: 256
    num_channels: 256
    num_res_blocks: 2
    channel_mult: ""
    learn_sigma: True 
    class_cond: false
    use_checkpoint: true
    attention_resolutions: "32,16,8"
    num_heads: 4
    num_head_channels: 64
    num_heads_upsample: -1
    use_scale_shift_norm: true
    dropout: 0.0
    resblock_updown: true
    use_fp16: false
    use_new_attention_order: false
    in_channels: 1
    out_channels: 1
    condition_channels: 3
    resamp_with_conv: True
    model_flag: 'test'

diffusion:
    diffusion_steps: 1000
    noise_schedule: cosine
    use_kl: false
    predict_xstart: false
    rescale_timesteps: false
    rescale_learned_sigmas: false
    timestep_respacing: "250"

schedule_jump_params:
  t_T: 250
  n_sample: 1
  jump_length: 10
  jump_n_sample: 10

data:
  return_dataloader: false 
  eval:
    gt_path: ./dataset/test/gt
    mask_path: ./dataset/test/mask
    refer_path: ./dataset/test/reference
    image_size: 256
    class_cond: false
    deterministic: true
    random_crop: false
    random_flip: false
    return_dict: true
    drop_last: false
    batch_size: 1
    offset: 0
    max_len: 3
    paths:
      records: ./output/records
      srs: ./output/inpainted_result
      lrs: ./output/masked_data
      gts: ./output/ground_truth
      gt_keep_masks: ./output/gt_mask